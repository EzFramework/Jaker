name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and run tests (with JaCoCo)
        run: mvn -B -ntp -Djacoco.minimum=0.0 verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: '**/target/site/jacoco'

      - name: Upload JaCoCo aggregated report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-aggregate-report
          path: 'target/site/jacoco-aggregate'

      - name: Upload JaCoCo exec
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-exec
          path: '**/target/jacoco.exec'

  bench:
    name: Bench (${{ matrix.os }} / ${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'windows-latest', 'macos-latest']
        java: ['25']
        profile: ['smoke']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '${{ matrix.java }}'
          cache: maven

      - name: Build bench module
        run: mvn -pl jaker-bench -am -DskipTests=true -B -ntp package
        shell: bash

      - name: Run benchmarks
        run: |
          set -e
          if [ "${{ matrix.profile }}" = "smoke" ]; then
            args="-wi 0 -i 1 -f 1"
          else
            args="-wi 3 -i 3 -f 1"
          fi
          JAR=$( (ls jaker-bench/target/*-shaded.jar 2>/dev/null) || (ls jaker-bench/target/*.jar 2>/dev/null | head -n1) )
          echo "Using jar: $JAR"
          java -jar "$JAR" $args -rf json -rff jmh-${{ matrix.profile }}-${{ runner.os }}.json
        shell: bash

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results-${{ matrix.profile }}-${{ runner.os }}-jdk${{ matrix.java }}
          path: jmh-${{ matrix.profile }}-${{ runner.os }}.json


  bench-summary:
    name: Post benchmark summary
    runs-on: ubuntu-latest
    needs: bench
    if: ${{ needs.bench.result == 'success' || needs.bench.result == 'failure' }}
    timeout-minutes: 5

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v8
        with:
          pattern: bench-results-smoke-*
          merge-multiple: true
          path: bench-results

      - name: Post combined benchmark comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const dir = 'bench-results';
            let allResults = [];
            if (fs.existsSync(dir)) {
              for (const f of fs.readdirSync(dir).filter(f => f.endsWith('.json'))) {
                try {
                  const raw = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
                  allResults = allResults.concat(Array.isArray(raw) ? raw : (raw.benchmarks || []));
                } catch (e) { console.error(`Failed to parse ${f}: ${e}`); }
              }
            }
            if (!allResults.length) { console.log('No benchmark results found'); return; }

            const compareResults = allResults.filter(r => r.benchmark?.includes('CompareFakerBench'));

            function parseEntry(name) {
              const method = name.split('.').pop();
              for (const [prefix, label] of [['jaker', 'Jaker'], ['dataFaker', 'DataFaker'], ['javaFaker', 'JavaFaker']]) {
                if (method.startsWith(prefix)) {
                  const t = method.slice(prefix.length);
                  return { library: label, test: t.charAt(0).toLowerCase() + t.slice(1) };
                }
              }
              return null;
            }

            const grouped = {};
            for (const r of compareResults) {
              const parsed = parseEntry(r.benchmark);
              if (!parsed) continue;
              const { library, test } = parsed;
              if (!grouped[test]) grouped[test] = {};
              if (!grouped[test][library]) grouped[test][library] = [];
              grouped[test][library].push(r.primaryMetric.score);
            }

            const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

            function fmtOps(s) {
              if (s >= 1e9) return `~${(s / 1e9).toFixed(1)}B ops/s`;
              if (s >= 1e6) return `~${(s / 1e6).toFixed(1)}M ops/s`;
              if (s >= 1e3) return `~${Math.round(s / 1e3)}K ops/s`;
              return `~${Math.round(s)} ops/s`;
            }

            function fmtMult(a, b) {
              const m = a / b;
              return m >= 10 ? `~${Math.round(m)}x` : `~${m.toFixed(1)}x`;
            }

            const testOrder = ['firstName', 'fullPerson', 'numberBetween', 'createFaker'];
            const lines = ['## Benchmark results', '', '> Averaged across Linux, Windows and macOS — JDK 25', ''];

            for (const test of testOrder) {
              if (!grouped[test]) continue;
              lines.push(`### ${test}`);
              const scores = {};
              for (const lib of ['Jaker', 'DataFaker', 'JavaFaker']) {
                if (grouped[test][lib]?.length) {
                  scores[lib] = avg(grouped[test][lib]);
                  lines.push(`${lib}: ${fmtOps(scores[lib])}`);
                }
              }
              lines.push('');
              if (scores.Jaker && scores.DataFaker) lines.push(`- ${fmtMult(scores.Jaker, scores.DataFaker)} faster than DataFaker`);
              if (scores.Jaker && scores.JavaFaker) lines.push(`- ${fmtMult(scores.Jaker, scores.JavaFaker)} faster than JavaFaker`);
              lines.push('');
            }

            const body = lines.join('\n');

            if (context.payload?.pull_request?.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            } else {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha || process.env.GITHUB_SHA,
                body
              });
            }
